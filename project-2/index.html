<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghost - Squash Visualizer</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Gruppo&family=Lexend:wght@100..900&display=swap" rel="stylesheet">
    
    <script src="https://docs.opencv.org/4.x/opencv.js" async></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-core"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-converter"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-webgl"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection"></script>
</head>
<body>

    <div id="home" class="screen active">
        <section class="hero">
            <div class="hero-content">
                <h1 class="logo">GH<img src="assets/squashball.svg" class="ball" alt="O">ST</h1>
                <p class="tagline">squash movement visualizer</p>
            </div>

            <div class="scroll-arrow" id="scrollArrow">
                <div class="chevron"></div>
                <div class="chevron"></div>
                <div class="chevron"></div>
            </div>
        </section>

        <section class="court-section">
            <div class="court"></div>
            <p class="credit">created by Anthony Mendias</p>
        </section>

        <section class="cta">
            <button onclick="goToAbout()">INSTRUCTIONS</button>
            <button onclick="goToCamera()">START RECORDING</button>
            <button onclick="showPastRallies()">PAST RALLIES</button>
        </section>
    </div>

    <div id="camera" class="screen">
        <div class="camera-ui-container">
            <video id="cameraFeed" autoplay playsinline></video>
            <canvas id="overlayCanvas"></canvas>
            
            <div class="camera-controls">
                <p id="instruction">Tap: Front-Left</p>
                <div class="button-group">
                    <button onclick="resetCalibration()">RESET</button>
                    <button id="startTrackBtn" onclick="startCapture()" disabled>START RECORDING</button>
                    <button onclick="goHome()">BACK</button>
                </div>
            </div>
        </div>
    </div>

   <div id="edit" class="screen">
        <div class="animation-container">
            <h3 id="editorHeader">Live Movement</h3>
            
            <canvas id="courtCanvas" width="210" height="320"></canvas>
            
            <div id="editorControls" style="display:none; width: 100%; text-align: center;">
                <input type="range" id="timeline" min="0" value="0" oninput="manualSeek(this.value)" style="width: 80%;">
                
                <div class="editor-settings-row">
                    <div class="color-pickers">
                        <input type="color" id="p1Color" title="Player 1" value="#00ffff" oninput="drawFrame(currentTime)">
                        <input type="color" id="p2Color" title="Player 2" value="#ff00ff" oninput="drawFrame(currentTime)">
                        <input type="color" id="courtColor" title="Court Lines" value="#ff0000" oninput="drawFrame(currentTime)">
                        <input type="color" id="bgColor" title="Background" value="#ffffff" oninput="drawFrame(currentTime)">
                    </div>

                    <label class="trail-label">
                        <span>GHOST TRAIL</span>
                        <input type="checkbox" id="trailToggle" checked onchange="drawFrame(currentTime)">
                    </label>
                </div> 
                
                <div class="button-group" style="margin: 10px 0;">
                    <button onclick="togglePlayback()">PLAY / PAUSE</button>
                    <button onclick="saveRallyChanges()">SAVE CHANGES</button>
                    <button id="exportBtn" onclick="exportRallyVideo()">EXPORT VIDEO</button>
                </div>

                <button onclick="goHome()">BACK</button>
            </div>

            <button id="stopBtn" class="stop-btn" onclick="stopRecording()">STOP & SAVE</button>
        </div>
    </div>

    <div id="history" class="screen">
        <div class="animation-container">
            <h2 style="color: rgb(255, 0, 0); font-family: 'Lexend';">Rally Archives</h2>
            <div id="rallyList" style="width: 80%; max-height: 50vh; overflow-y: auto; margin: 20px 0; display: flex; flex-direction: column; gap: 10px;">
                </div>
            <button onclick="goHome()">BACK</button>
        </div>
    </div>

    <div id="aboutModal" class="modal-overlay">
        <div class="modal-content">
            <span class="close-modal" onclick="closeAbout()">&times;</span>

            <div id="stepContainer">
                <div class="step active">
                    <img src="step1.png" alt="Step 1">
                    <p>Instruction text for Step 1 goes here.</p>
                </div>
                <div class="step">
                    <img src="step2.png" alt="Step 2">
                    <p>Instruction text for Step 2 goes here.</p>
                </div>
                <div class="step">
                    <img src="step3.png" alt="Step 3">
                    <p>Instruction text for Step 3 goes here.</p>
                </div>
            </div>

            <div class="modal-nav">
                <button class="nav-arrow" onclick="moveStep(-1)">&#10094;</button>
                <div id="dotContainer">
                    <span class="dot active" onclick="setStep(0)"></span>
                    <span class="dot" onclick="setStep(1)"></span>
                    <span class="dot" onclick="setStep(2)"></span>
                </div>
                <button class="nav-arrow" onclick="moveStep(1)">&#10095;</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
