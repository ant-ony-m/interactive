<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghost - Squash Visualizer</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Gruppo&family=Lexend:wght@100..900&display=swap" rel="stylesheet">
    
    <script src="https://docs.opencv.org/4.x/opencv.js" async></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-core"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-converter"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-webgl"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection"></script>
</head>
<body>

    <div id="home" class="screen active">
        <section class="hero">
            <div class="hero-content">
                <h1 class="logo">GH<img src="assets/squashball.svg" class="ball" alt="O">ST</h1>
                <p class="tagline">squash movement visualizer</p>
            </div>
        </section>

        <section class="court-section">
            <div class="court"></div>
            <p class="credit">created by Anthony Mendias</p>
        </section>

        <section class="cta">
            <button onclick="alert('Ghost tracks player efficiency using homography projection.')">ABOUT</button>
            <button onclick="goToCamera()">START RECORDING</button>
            <button onclick="showPastRallies()">PAST RALLIES</button>
        </section>
    </div>

    <div id="camera" class="screen">
        <div class="camera-ui-container">
            <video id="cameraFeed" autoplay playsinline></video>
            <canvas id="overlayCanvas"></canvas>
            
            <div class="camera-controls">
                <p id="instruction">Tap 4 corners: Front-L, Front-R, Back-R, Back-L</p>
                <div class="button-group">
                    <button onclick="resetCalibration()">RESET</button>
                    <button id="startTrackBtn" onclick="startCapture()" disabled>START RECORDING</button>
                    <button onclick="goHome()">BACK</button>
                </div>
            </div>
        </div>
    </div>

    <div id="edit" class="screen">
        <div class="animation-container">
            <h3 id="liveHeader">Live Movement</h3>
            
            <canvas id="courtCanvas" width="210" height="320"></canvas>
            
            <div id="editorControls" style="display:none; width: 100%; text-align: center;">
                <input type="range" id="timeline" style="width:80%" min="0" value="0" oninput="manualSeek(this.value)">
                
                <div class="controls-row">
                    <button onclick="togglePlayback()">Play/Pause</button>
                    <input type="color" id="p1Color" title="Player 1" value="#00ffff">
                    <input type="color" id="p2Color" title="Player 2" value="#ff00ff">
                    <input type="color" id="courtColor" title="Court Lines" value="#ff0000">
                    <input type="color" id="bgColor" title="Background" value="#ffffff">
                </div>
                
                <button onclick="saveRallyChanges()">SAVE CHANGES</button>
            </div>

            <button id="stopBtn" class="stop-btn" onclick="stopRecording()">STOP & SAVE</button>
            <button id="backBtn" style="display:none" onclick="goHome()">BACK</button>
        </div>
    </div>

    <div id="history" class="screen">
        <div class="animation-container">
            <h2 style="color: rgb(255, 0, 0); font-family: 'Lexend';">Rally Archives</h2>
            <div id="rallyList" style="width: 80%; max-height: 50vh; overflow-y: auto; margin: 20px 0; display: flex; flex-direction: column; gap: 10px;">
                </div>
            <button onclick="goHome()">BACK</button>
        </div>
    </div>

    <div id="editorControls" style="display:none; width: 100%; text-align: center;">
        <input type="range" id="timeline" style="width:80%" min="0" value="0" oninput="manualSeek(this.value)">
        <div class="controls-row">
            <button onclick="togglePlayback()">Play/Pause</button>
            <input type="color" id="p1Color" title="Player 1" value="#00ffff">
            <input type="color" id="p2Color" title="Player 2" value="#ff00ff">
            <input type="color" id="courtColor" title="Court Lines" value="#ff0000">
            <input type="color" id="bgColor" title="Background" value="#ffffff">
        </div>
        <button onclick="saveRallyChanges()">SAVE CHANGES</button>
    </div>

    <script src="app.js"></script>
</body>
</html>
