<!DOCTYPE html>
<html>
<head>
    <title>Camera Test - Squash Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    <style>
        body { margin: 0; background: #111; color: white; text-align: center; font-family: sans-serif; }
        video { width: 100%; max-width: 640px; transform: scaleX(1); } /* Back cam doesn't need flip */
        canvas { position: absolute; left: 0; top: 0; width: 100%; height: 100%; }
        .container { position: relative; display: inline-block; }
    </style>
</head>
<body>
    <h2>Squash Multi-Track Test</h2>
    <div class="container">
        <video id="input_video"></video>
        <canvas id="output_canvas"></canvas>
    </div>
    <div id="status">Starting camera...</div>

    <script src="test_logic.js"></script>
</body>
</html>
